<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IA MNIST</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="container">

    <section class="hero">
        <span class="badge">Deep Learning Demo</span>
        <h1>Reconocimiento de dígitos con IA</h1>
        <p>Dibuja un número del 0 al 9 y compara la predicción entre Python y Rust.</p>
    </section>

    <section class="workspace">

        <div class="card draw-card">
            <h2>Entrada</h2>
            <p>Dibuja aquí el número</p>

            <canvas id="canvas" width="280" height="280"></canvas>

            <div class="buttons">
                <button class="secondary" onclick="clearCanvas()">Limpiar</button>
                <button class="primary" onclick="sendImage()">Predecir</button>
            </div>
        </div>

        <div class="card result-card">
            <h2>Resultados</h2>

            <div id="loading" class="loading hidden">
                Analizando imagen...
            </div>

            <div id="results" class="results">
                <p class="empty">Aún no hay predicción.</p>
            </div>
        </div>

    </section>

</main>

<script src="app.js"></script>
</body>
</html>
