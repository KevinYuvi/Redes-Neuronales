<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>IA MNIST</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="container">

        <section class="hero">
            <h1>Reconocimiento de dígitos</h1>
        </section>

        <section class="workspace">

            <div class="card draw-card">
                <h2>Entrada</h2>
                <p>Dibuja aquí el número</p>

                <canvas id="canvas" width="280" height="280"></canvas>

                <div class="buttons">
                    <button class="secondary" onclick="clearCanvas()">Limpiar</button>
                    <button class="primary" onclick="sendImage()">Predecir</button>
                </div>
            </div>

            <div class="card result-card">
                <h2>Resultados</h2>

                <div id="loading" class="loading hidden">
                    Analizando imagen...
                </div>

                <div id="results" class="results">
                    <p class="empty">Aún no hay predicción.</p>
                </div>
            </div>

        </section>

    </main>

    <script src="app.js"></script>
</body>

</html>
